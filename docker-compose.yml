# Multi-user LINE Smart Digest
#
# One service handles all users. Each user onboards via the web UI.
#
# Usage:
#   docker compose up -d
#   Open http://localhost:3000 (dashboard)
#   Send http://localhost:3000/join to anyone who wants to join

services:
  line-digest:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
