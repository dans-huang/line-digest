name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: NODE_ENV=test npx tsx --test src/config.test.ts src/message-store.test.ts src/digest-engine.test.ts src/scheduler.test.ts
      - run: npx tsc --noEmit
